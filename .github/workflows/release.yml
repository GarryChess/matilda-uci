# PyPI release via trusted publishing (OIDC — no API token stored).
# Matches the publisher registered on PyPI for this repo:
#   project: matilda-uci   repo: jcarlson212/matilda-uci   workflow: release.yml
#
# Trigger: push a version tag, e.g.
#   git tag v0.1.0 && git push origin v0.1.0
name: release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + dev tools
        run: pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Tests
        # Torch-gated model tests run (torch is a core dependency); tests that
        # need the gitignored checkpoints or the maia3 runtime skip cleanly.
        run: python -m pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - name: Check tag matches package version
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "tag $GITHUB_REF_NAME != pyproject version $PKG_VERSION" >&2
            exit 1
          fi
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
